<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="./vue.js"></script>
  <title>VueJS</title>
</head>

<body>
  <div id="app">
    <h1>Cursos Disponíveis</h1>
    <div v-for="curso, key in cursos" :key="key">
      <h2>{{curso.curso}}</h2>
      <ul>
        <li v-for="aula in curso.aulas">
          <p>Aula: {{aula.nome}} e {{aula.tempo}}</p>
        </li>
      </ul>
      <a :href="curso.link">Acessar Curso</a>
    </div>
    <button @click="puxarCursos">Consultar Cursos</button>
  </div>

  <script>
    const vm = new Vue({
      el: "#app",
      data: {
        cursos: {}
      },
      methods: {
        puxarCursos() {
          fetch("./cursos.json")
            .then(response => response.json())
            .then(json => {
              this.cursos = json
            })
        }
      }
    })
  </script>
  <!--
  Utilizando a api:
  https://viacep.com.br/ws/04538133/json/
  Mostre o cep, logradouro, complemento, bairro, localidade e uf do que for retornado.

  Use o arquivo json da aula, para listar os cursos e as matérias.
-->

</body>

</html>
