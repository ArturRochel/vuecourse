<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="./vue.js"></script>
  <title>VueJS</title>
</head>

<body>
  <div id="app">
    <h1>Total: {{contador}}</h1>
    <button @click="contador++">Aumentar</button>
    <button @click="contador--">Diminuir</button>
    {{usuario}}

    <img :src="usuario.avatar_url" alt="">
  </div>

  <script>
    const vm = new Vue({
      el: "#app",
      data: {
        usuario: {},
        contador: 0
      },
      methods: {
        puxarUsuario() {
          fetch("https://api.github.com/users/arturrochel")
            .then(response => response.json())
            .then(json => this.usuario = json)
        }
      },
      created() {
        this.puxarUsuario()
      },
      updated() {
        console.log(this.contador)
      }
    })
  </script>
  <!-- Utilize a api do github para
mostrar todos os seus dados na tela.
Faça o fetch das informações utilizando
um dos hooks do vue:

https://api.github.com/users/origamid (utilize o seu usuário)
 -->

  <!-- 
  Crie um contador, onde seja possível clicar em
  um botão e adicionar +1 ao número.

  Toda vez que o contador mudar, mude o título da página
  para o total do contador. Utilize um hook para isso
 -->


</body>

</html>
