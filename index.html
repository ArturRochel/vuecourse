<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="./vue.js"></script>
  <title>VueJS</title>
</head>

<body>
  <div id="app">
    <ul @click="trocarCor" :class="{column: isColumn}">
      <li :style="{background: corTexto}">Sobre</li>
      <li :style="{background: corTexto}">Produtos</li>
      <li :style="{background: corTexto}">Serviços</li>
      <li :style="{background: corTexto}">Contato</li>
    </ul>

    <button @click="isColumn = !isColumn">Alterar</button>
  </div>
  <script>
    const vm = new Vue({
      el: "#app",
      data: {
        isColumn: false,
        corTexto: "#84e"
      },
      methods: {
        trocarCor() {
          const color = `hsl(${Math.random() * 360}, 100%, 50%)`;
          this.corTexto = color
        }
      }
    })
  </script>

  <style>
    ul {
      display: flex;
      flex-wrap: wrap;
      font-family: monospace;
      list-style: none;
      padding: 0px;
      margin: 0px;
    }

    .column {
      flex-direction: column;
    }

    li {
      padding: 20px;
      background: #84e;
      color: white;
      border-radius: 4px;
      margin: 10px;
      flex: 1;
      text-align: center;
    }
  </style>
</body>

</html>
